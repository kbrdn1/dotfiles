# Claude Dark Theme for Tmux - Standalone
# ============================================
# ============================================

# Color Palette
set -g @claude_bg "#303030"
set -g @claude_fg "#e0e0e0"
set -g @claude_orange "#D4825D"
set -g @claude_orange_dark "#C15F3C"
set -g @claude_purple "#C79BFF"
set -g @claude_red "#FF7A7A"
set -g @claude_yellow "#FFDF61"
set -g @claude_green "#86E89A"
set -g @claude_cyan "#8ABFB8"
set -g @claude_blue "#7AB8FF"
set -g @claude_muted "#555555"
set -g @claude_surface0 "#2a2a2a"
set -g @claude_surface1 "#383838"
set -g @claude_surface2 "#444444"
set -g @claude_mantle "#282828"
set -g @claude_crust "#1a1a1a"
set -g @claude_subtext "#999999"

# Status bar position and style
set -g status on
set -g status-position top
set -g status-interval 2
set -g status-justify absolute-centre
set -g status-left-length 100
set -g status-right-length 150

# Status bar colors
set -g status-style "bg=default,fg=#e0e0e0"

# Message style
set -g message-style "bg=default,fg=#C79BFF"
set -g message-command-style "bg=#default,fg=#8ABFB8"

# Pane borders
set -g pane-border-style "fg=#383838"
set -g pane-active-border-style "fg=#D4825D"
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-format "#[default]#{?pane_active,#[fg=#D4825D],#[fg=#383838]}î‚¶#{?pane_active,#[fg=#282828],#[bg=#383838]}#{?pane_active,#[bg=#D4825D],}#{?pane_active,#[bg=#],#[fg=#999999]} ï’‰ #{pane_title} #{?window_zoomed_flag,#[fg=#C19F3C]َ°ٹ“,}#{?pane_active,#[fg=#D4825D],#[fg=#383838]}#{?pane_active,#[bg=default],#[bg=default]}î‚¼"

# Window status
set -g window-status-separator "#[fg=#383838,bg=default]â”€â”€"

# Inactive window - rounded pill style with window name (using powerline rounded)
set -g window-status-format "#[fg=#383838,bg=default]î‚¾#[fg=#999999,bg=#383838] î¯ˆ #I #W #[fg=#383838,bg=default]î‚¼"

# Active window - highlighted rounded pill with orange and window name
set -g window-status-current-format "#[fg=#D4825D,bg=default]î‚¾#[fg=#1a1a1a,bg=#D4825D,bold] î¯ˆ #I #W #[fg=#D4825D,bg=default]î‚¼"

# Status left - Session indicator with rounded style (changes to purple when prefix is active)
set -g status-left "#{?client_prefix,#[fg=#C79BFF]#[bg=default]î‚¶#[fg=#1a1a1a]#[bg=#C79BFF]#[bold] ï‹گ #S #[fg=#C79BFF]#[bg=default]î‚¼,#[fg=#D4825D]#[bg=default]î‚¶#[fg=#1a1a1a]#[bg=#D4825D]#[bold] ï‹گ #S #[fg=#D4825D]#[bg=default]î‚¼}"

# Status right - CPU, Memory, Date/Time with rounded pill segments
set -g status-right "#[fg=#282828,bg=default]î‚¾#[fg=#D4825D,bg=#242424]#[bg=#242424] ï“µ #(~/.config/tmux/plugins/claude-dark/scripts/claude-usage.sh)%%#[fg=#C79BFF,bg=#242424]#[bg=#242424] َ°ڑ© #(~/.config/tmux/plugins/claude-dark/scripts/copilot-usage.sh)%% #[fg=#242424,bg=default]#[fg=#383838,bg=#242424]î‚¾#[fg=#86E89A,bg=#383838] َ°چ› #{cpu_percentage} #[fg=#7AB8FF,bg=#383838]َ°کڑ #{ram_percentage} #[fg=#D4825D,bg=#383838]î‚¾#[fg=#1a1a1a,bg=#D4825D] َ°ƒ° %Y/%m/%d | %H:%M #[fg=#D4825D,bg=default]î‚´"

# Mode style (copy mode, etc.)
set -g mode-style "bg=#444444,fg=#e0e0e0"

# Clock
set -g clock-mode-colour "#D4825D"
set -g clock-mode-style 24

# Bell
set -g window-status-bell-style "bg=#FF7A7A,fg=#1a1a1a"
set -g window-status-activity-style "bg=#FFDF61,fg=#1a1a1a"

# Selection
set -g copy-mode-match-style "bg=#D4825D,fg=#1a1a1a"
set -g copy-mode-current-match-style "bg=#C15F3C,fg=#e0e0e0"

# Window settings - automatic rename enabled
set -g renumber-windows on
set -g allow-rename on
set -wg automatic-rename off
