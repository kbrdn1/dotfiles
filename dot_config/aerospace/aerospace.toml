# ╭─────────────────────────────────────────────────────────────╮
# │                    AeroSpace Configuration                  │
# │              Configuration Workflow Développeur             │
# │           Alt Droite via hidutil + Mode Leader              │
# ╰─────────────────────────────────────────────────────────────╯

# Place ce fichier dans ~/.config/aerospace/aerospace.toml
# Configuration optimisée pour workflow de développement avec 8 workspaces spécialisés
#
# SETUP (sans Karabiner - workaround bug macOS Tahoe 26.4 beta) :
#   hidutil remappe right_option → F18 (LaunchAgent: com.local.hidutil-remap)
#   F18 sert de "leader key" pour entrer en mode aero
#   Les bindings ctrl-alt sont gardés en fallback (clavier externe + Karabiner)

# ═══════════════════════════════════════════════════════════════
# PARAMÈTRES GÉNÉRAUX
# ═══════════════════════════════════════════════════════════════

# Démarrer AeroSpace au login
start-at-login = true

# Normalisation des containers (recommandé)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Padding pour layout accordion (cascade)
accordion-padding = 25

# Layout par défaut : tiles pour les splits
default-root-container-layout = 'tiles'

# Orientation automatique selon la forme du monitor
default-root-container-orientation = 'auto'

# Réactiver automatiquement les apps cachées par cmd-h
automatically-unhide-macos-hidden-apps = true

# Forcer tous les workspaces sur l'écran principal (monitor 1)
[workspace-to-monitor-force-assignment]
1 = 1  # Workspace 1 → Monitor 1
2 = 1  # Workspace 2 → Monitor 1
3 = 1  # Workspace 3 → Monitor 1
4 = 1  # Workspace 4 → Monitor 1
5 = 1  # Workspace 5 → Monitor 1
6 = 1  # Workspace 6 → Monitor 1
7 = 1  # Workspace 7 → Monitor 1
8 = 1  # Workspace 8 → Monitor 1

# ═══════════════════════════════════════════════════════════════
# CALLBACKS ET INTÉGRATIONS
# ═══════════════════════════════════════════════════════════════

# Souris suit le focus entre moniteurs
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Intégration Sketchybar - notification changements workspace
# Note: broken in v0.20-Beta, triggers are in keybindings as workaround
exec-on-workspace-change = ['exec-and-forget sketchybar --trigger aerospace_workspace_change']

# Commandes après démarrage
after-startup-command = [
    # Optionnel: lancer des apps au démarrage
    # 'exec-and-forget open -a "Arc"',
    # 'exec-and-forget open -a "Mail"'
]

# ═══════════════════════════════════════════════════════════════
# CONFIGURATION CLAVIER
# ═══════════════════════════════════════════════════════════════

[key-mapping]
preset = 'qwerty'

# IMPORTANT: Configuration AZERTY avec Alt gauche préservé
#
# AeroSpace ne supporte que qwerty/dvorak/colemak (pas azerty natif)
# Sur AZERTY, Alt gauche est ESSENTIEL pour : { } [ ] @ # | \ etc.
#
# IMPORTANT: Configuration AZERTY avec Alt droite EXCLUSIF
#
# AeroSpace ne supporte que qwerty/dvorak/colemak (pas azerty natif)
# Sur AZERTY, Alt gauche est ESSENTIEL pour : { } [ ] @ # | \ etc.
#
# SOLUTION ACTUELLE (hidutil - sans Karabiner) :
#   hidutil remappe right_option → F18 (persistant via LaunchAgent)
#   F18 = leader key → entre en mode "aero"
#   Appui right_option puis touche = action AeroSpace
#   Alt gauche reste 100% libre pour les caractères spéciaux AZERTY
#
# FALLBACK (clavier externe au taf si Karabiner fonctionne) :
#   Les bindings ctrl-alt-* restent actifs en mode main
#   Karabiner remappe right_option → ctrl+alt sur clavier externe

# ═══════════════════════════════════════════════════════════════
# ESPACES ENTRE FENÊTRES
# ═══════════════════════════════════════════════════════════════

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
# outer.top = 8
outer.top = 44
outer.right = 8

# ═══════════════════════════════════════════════════════════════
# RACCOURCIS PRINCIPAUX
# ═══════════════════════════════════════════════════════════════

[mode.main.binding]

# Leader key : right_option (remappee en F18 via hidutil)
f18 = ['mode aero', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=aero']

# ┌─────────────────────────────────────────────────────────────┐
# │              FALLBACK ctrl-alt (clavier externe)            │
# └─────────────────────────────────────────────────────────────┘

# Workspaces optimisés AZERTY (préserve { } [ ] | \ @ ` pour le code)
# Chaque binding trigger aussi sketchybar pour maj de la barre
ctrl-alt-1 = ['workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=1']
ctrl-alt-2 = ['workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=2']
ctrl-alt-3 = ['workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=3']
ctrl-alt-q = ['workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=4']
ctrl-alt-w = ['workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=5']
ctrl-alt-e = ['workspace 6', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=6']
ctrl-alt-o = ['workspace 7', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=7']
ctrl-alt-c = ['workspace 8', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=8']

# Navigation rapide
ctrl-alt-tab = ['workspace-back-and-forth', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

# ┌─────────────────────────────────────────────────────────────┐
# │                   DÉPLACER VERS WORKSPACES                  │
# └─────────────────────────────────────────────────────────────┘

# Déplacer fenêtre active vers workspace
ctrl-alt-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-q = ['move-node-to-workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-w = ['move-node-to-workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-e = ['move-node-to-workspace 6', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-o = ['move-node-to-workspace 7', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
ctrl-alt-shift-c = ['move-node-to-workspace 8', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

# Déplacer ET suivre

# ┌─────────────────────────────────────────────────────────────┐
# │                      FOCUS FENÊTRES                         │
# └─────────────────────────────────────────────────────────────┘

# Navigation vim-style
ctrl-alt-h = 'focus left'
ctrl-alt-j = 'focus down'
ctrl-alt-k = 'focus up'
ctrl-alt-l = 'focus right'

# Navigation flèches
ctrl-alt-left = 'focus left'
ctrl-alt-down = 'focus down'
ctrl-alt-up = 'focus up'
ctrl-alt-right = 'focus right'

# ┌─────────────────────────────────────────────────────────────┐
# │                    DÉPLACER FENÊTRES                        │
# └─────────────────────────────────────────────────────────────┘

# Déplacer fenêtres vim-style
ctrl-alt-shift-h = 'move left'
ctrl-alt-shift-j = 'move down'
ctrl-alt-shift-k = 'move up'
ctrl-alt-shift-l = 'move right'

# Déplacer fenêtres avec flèches
ctrl-alt-shift-left = 'move left'
ctrl-alt-shift-down = 'move down'
ctrl-alt-shift-up = 'move up'
ctrl-alt-shift-right = 'move right'

# ┌─────────────────────────────────────────────────────────────┐
# │                       LAYOUTS                               │
# └─────────────────────────────────────────────────────────────┘

# Basculer entre tiles et accordion (cascade)
ctrl-alt-slash = 'layout tiles horizontal vertical'
ctrl-alt-comma = 'layout accordion horizontal vertical'

# Toggle floating
ctrl-alt-shift-space = 'layout floating tiling'

# Fullscreen toggle
ctrl-alt-f = 'fullscreen'

# ┌─────────────────────────────────────────────────────────────┐
# │                      REDIMENSIONNER                         │
# └─────────────────────────────────────────────────────────────┘

# Redimensionner intelligemment
ctrl-alt-minus = 'resize smart -50'
ctrl-alt-equal = 'resize smart +50'

# Mode resize dedie
ctrl-alt-r = ['mode resize', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=resize']

# ┌─────────────────────────────────────────────────────────────┐
# │                       UTILITAIRES                           │
# └─────────────────────────────────────────────────────────────┘

# Mode service pour actions avancees
ctrl-alt-shift-semicolon = ['mode service', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=service']

# Reload config
ctrl-alt-shift-r = 'reload-config'

# Fermer fenêtre
ctrl-alt-shift-x = 'close'

# Balance automatique
ctrl-alt-shift-equal = 'balance-sizes'

# Ouvrir terminal (Ghostty)
ctrl-alt-enter = 'exec-and-forget open -a Ghostty'

# ═══════════════════════════════════════════════════════════════
# MODE AERO (Leader Key = right_option → F18)
# ═══════════════════════════════════════════════════════════════
# Appuyer right_option → entre ici → taper une touche → retour auto en main

[mode.aero.binding]

# Annuler
esc = ['exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']

# ┌─────────────────────────────────────────────────────────────┐
# │                    NAVIGATION WORKSPACES                    │
# └─────────────────────────────────────────────────────────────┘

1 = ['workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=1', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
2 = ['workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=2', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
3 = ['workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=3', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
q = ['workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=4', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
w = ['workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=5', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
e = ['workspace 6', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=6', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
o = ['workspace 7', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=7', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']
c = ['workspace 8', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=8', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']

# Navigation rapide
tab = ['workspace-back-and-forth', 'exec-and-forget sketchybar --trigger aerospace_workspace_change', 'exec-and-forget sketchybar --trigger aerospace_mode_change MODE=main', 'mode main']

# ┌─────────────────────────────────────────────────────────────┐
